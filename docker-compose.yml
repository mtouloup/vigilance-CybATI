services:
  vigilance-assets:
    build:
      context: .
    image: vigilance-assets:local
    ports:
      - "${PORT:-8000}:8000"
    environment:
      PORT: 8000
      VIGILANCE_GOOGLE_SPREADSHEET_ID: ${VIGILANCE_GOOGLE_SPREADSHEET_ID:?set the public spreadsheet id}
      VIGILANCE_GOOGLE_WORKSHEET_NAME: ${VIGILANCE_GOOGLE_WORKSHEET_NAME:-ASSETS}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
    restart: unless-stopped
