services:
  vigilance-assets:
    build:
      context: .
    image: vigilance-assets:local
    ports:
      - "${PORT:-8000}:8000"
    environment:
      PORT: 8000
      VIGILANCE_STORAGE_BACKEND: ${VIGILANCE_STORAGE_BACKEND:-google_sheets}
      VIGILANCE_GOOGLE_SPREADSHEET_ID: ${VIGILANCE_GOOGLE_SPREADSHEET_ID:-}
      VIGILANCE_GOOGLE_WORKSHEET_NAME: ${VIGILANCE_GOOGLE_WORKSHEET_NAME:-ASSETS}
      VIGILANCE_GOOGLE_SERVICE_ACCOUNT_FILE: ${VIGILANCE_GOOGLE_SERVICE_ACCOUNT_FILE:-}
      VIGILANCE_GOOGLE_SERVICE_ACCOUNT_JSON: ${VIGILANCE_GOOGLE_SERVICE_ACCOUNT_JSON:-}
      VIGILANCE_GOOGLE_READ_ONLY_PUBLIC: ${VIGILANCE_GOOGLE_READ_ONLY_PUBLIC:-false}
      VIGILANCE_SHAREPOINT_TENANT_ID: ${VIGILANCE_SHAREPOINT_TENANT_ID:-}
      VIGILANCE_SHAREPOINT_CLIENT_ID: ${VIGILANCE_SHAREPOINT_CLIENT_ID:-}
      VIGILANCE_SHAREPOINT_CLIENT_SECRET: ${VIGILANCE_SHAREPOINT_CLIENT_SECRET:-}
      VIGILANCE_SHAREPOINT_SITE_ID: ${VIGILANCE_SHAREPOINT_SITE_ID:-}
      VIGILANCE_SHAREPOINT_SITE_URL: ${VIGILANCE_SHAREPOINT_SITE_URL:-}
      VIGILANCE_SHAREPOINT_DRIVE_ID: ${VIGILANCE_SHAREPOINT_DRIVE_ID:-}
      VIGILANCE_SHAREPOINT_ITEM_ID: ${VIGILANCE_SHAREPOINT_ITEM_ID:-}
      VIGILANCE_SHAREPOINT_WORKBOOK_PATH: ${VIGILANCE_SHAREPOINT_WORKBOOK_PATH:-}
      VIGILANCE_SHAREPOINT_WORKSHEET_NAME: ${VIGILANCE_SHAREPOINT_WORKSHEET_NAME:-ASSETS}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
    restart: unless-stopped
