services:
  vigilance-assets:
    build:
      context: .
    image: vigilance-assets:local
    ports:
      - "${PORT:-8000}:8000"
    environment:
      PORT: 8000
      VIGILANCE_SPREADSHEET_BACKEND: ${VIGILANCE_SPREADSHEET_BACKEND:-memory}
      VIGILANCE_SPREADSHEET_REFERENCE: ${VIGILANCE_SPREADSHEET_REFERENCE:-}
      VIGILANCE_SPREADSHEET_WORKBOOK_PATH: ${VIGILANCE_SPREADSHEET_WORKBOOK_PATH:-}
      VIGILANCE_SPREADSHEET_WORKBOOK_READ_ONLY: ${VIGILANCE_SPREADSHEET_WORKBOOK_READ_ONLY:-false}
      VIGILANCE_SPREADSHEET_GOOGLE_ID: ${VIGILANCE_SPREADSHEET_GOOGLE_ID:-}
      VIGILANCE_GOOGLE_CREDENTIALS_PATH: ${VIGILANCE_GOOGLE_CREDENTIALS_PATH:-}
      VIGILANCE_GOOGLE_CREDENTIALS_JSON: ${VIGILANCE_GOOGLE_CREDENTIALS_JSON:-}
      VIGILANCE_ASSETS_SHEET_NAME: ${VIGILANCE_ASSETS_SHEET_NAME:-ASSETS}
      VIGILANCE_VOCABULARIES_SHEET_NAME: ${VIGILANCE_VOCABULARIES_SHEET_NAME:-VOCABULARIES}
    restart: unless-stopped
